version: '3.8'

services:
  medicos-emr:
    build: .
    container_name: medicos_emr
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database and other data
      - medicos_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/emr_data.sqlite3
      # Note: For production, generate a secure random string for JWT_SECRET
      - JWT_SECRET=change_this_to_a_secure_random_string_in_production
      # Uncomment and set your Supabase credentials if using cloud sync
      # - SUPABASE_URL=https://your-project.supabase.co
      # - SUPABASE_KEY=your_supabase_service_role_key
    restart: unless-stopped

volumes:
  medicos_data:

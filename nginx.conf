worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream_addr="$upstream_addr" response_time="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Microservice Upstreams ─────────────────────────────────────────────
    
    # Auth & Admin microservice
    upstream auth_backend {
        server auth-service:4000;
    }

    # Clinical microservice — load balanced across 2 active replica instances
    upstream clinical_backend {
        server clinical-service-1:4000;
        server clinical-service-2:4000;
    }

    # Billing & Pharmacy microservice
    upstream billing_backend {
        server billing-service:4000;
    }

    # Offline sync microservice
    upstream sync_backend {
        server sync-service:4000;
    }

    # ── HTTP Server Gateway ──────────────────────────────────────────────
    server {
        listen 3000;
        server_name localhost;

        # Root folder containing built static files from client-builder stage
        root /usr/share/nginx/html;
        index index.html;

        # ── API Gateway Routing ──

        # Auth Routes
        location ~ ^/api/(auth|users|super-admin) {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 60s;
        }

        # Clinical Routes (load-balanced)
        location ~ ^/api/(patients|encounters|vitals|prescriptions|appointments|beds|notifications|dashboard) {
            proxy_pass http://clinical_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 60s;
        }

        # Billing Routes
        location ~ ^/api/(billing|pharmacy|patient-uploads) {
            proxy_pass http://billing_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 60s;
        }

        # Sync Route
        location /api/sync {
            proxy_pass http://sync_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 300s; # long timeout for heavy database syncs
        }

        # Default health check fallback (can hit any backend or default)
        location /api/health {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend Client Assets ──

        # Serve static assets or fallback to React routing for HTML5 history API
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache control for static assets (images, css, js)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp|manifest.json)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
